<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solicitação Recebida | Paradoxo</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Spectral:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="proposta-executiva.css">
    <style>
      .page-shell {
        background-color: var(--paper-strong) !important;
        border: 1px solid var(--line);
        box-shadow: 0 10px 40px rgba(23,34,37,0.05);
        border-radius: var(--radius-xl);
      }
    </style>
  </head>
  <body style="margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; background-color: var(--paper);">
    
    <div class="page-shell" style="max-width: 800px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 40px; text-align: center; box-sizing: border-box;">
      
      <a href="/"><img src="logo-vertical.svg" alt="Paradoxo" width="220" style="margin-bottom: 60px; opacity: 0.8; transition: opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'"></a>
      
      <h1 style="font-family: 'Spectral', serif; font-size: clamp(2rem, 4vw, 3rem); margin: 0 0 24px; color: var(--ink); line-height: 1.1; text-wrap: balance;">
        Solicitação Recebida
      </h1>
      
      <p style="font-family: 'Newsreader', serif; color: var(--ink-soft); font-size: 1.25rem; line-height: 1.5; margin: 0 0 48px; text-wrap: balance;">
        Agradecemos seu contato. Retornaremos em breve.
      </p>
      
      <a href="/" class="button button-primary" style="font-size: 1rem; padding: 16px 40px; letter-spacing: 0.05em; text-decoration: none; display: inline-block;">
        Voltar
      </a>

    </div>
  </body>
</html>
